{% load static %}
<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ page_title|default:"Gempa Indonesia" }}{% endblock %} — BMKG Monitor</title>
    <link rel="stylesheet" href="{% static 'css/core.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>
    <style>
        .gempa-popup .leaflet-popup-content-wrapper {
            background: #1f2937; border: 1px solid #374151; border-radius: 12px;
            box-shadow: 0 10px 25px rgb(0 0 0 / .5);
        }
        .gempa-popup .leaflet-popup-tip { background: #1f2937; border: 1px solid #374151; }
        .gempa-popup .leaflet-popup-close-button { color: #9ca3af; }
        .leaflet-control-zoom a {
            background: #111827 !important; border-color: #374151 !important; color: #d1d5db !important;
        }
        .leaflet-control-attribution {
            background: rgb(17 24 39 / .8) !important; color: #6b7280 !important; font-size: 10px !important;
        }
        .leaflet-control-attribution a { color: #9ca3af !important; }
        .leaflet-control-layers { background: #111827 !important; border-color: #374151 !important; border-radius: 10px !important; }
        .leaflet-control-layers-list { color: #d1d5db !important; }
        .leaflet-control-layers-separator { border-top-color: #374151 !important; }
        /* DataTables dark theme */
        table.dataTable { border-collapse: collapse !important; }
        .dt-container { color: #d1d5db; }
        .dt-container .dt-search input,
        .dt-container .dt-length select {
            background: #1f2937; color: #d1d5db; border: 1px solid #374151;
            border-radius: 6px; padding: 4px 8px; font-size: 13px;
        }
        .dt-container .dt-search input:focus,
        .dt-container .dt-length select:focus {
            outline: none; border-color: #10b981;
        }
        .dt-container .dt-info { color: #6b7280; font-size: 12px; }
        .dt-container .dt-paging .dt-paging-button {
            color: #9ca3af !important; background: transparent !important;
            border: 1px solid #374151 !important; border-radius: 6px !important;
            margin: 0 2px; padding: 4px 10px !important;
        }
        .dt-container .dt-paging .dt-paging-button.current,
        .dt-container .dt-paging .dt-paging-button:hover {
            background: #10b981 !important; color: #fff !important;
            border-color: #10b981 !important;
        }
        .dt-container .dt-paging .dt-paging-button.disabled {
            color: #4b5563 !important; background: transparent !important;
        }
        table.dataTable thead th { border-bottom-color: #374151 !important; }
        table.dataTable tbody tr { border-bottom-color: #1f2937 !important; }
        table.dataTable tbody tr:hover { background-color: rgba(31,41,55,.5) !important; }
        .dt-container .dt-search label,
        .dt-container .dt-length label { color: #6b7280; font-size: 12px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-950 text-gray-100 antialiased">
    <div class="flex h-full">

        {% include 'sidebar.html' %}

        <!-- Mobile header -->
        <div class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-gray-900/95 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center gap-3">
            <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')"
                    class="p-1.5 rounded-lg hover:bg-gray-800 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <span class="font-semibold text-emerald-400">Gempa Monitor</span>
        </div>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto lg:ml-0 pt-14 lg:pt-0">
            <div class="p-4 lg:p-6 max-w-screen-2xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/map.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
