{% load static %}
<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ seo_title|default:"Gempa Indonesia — BMKG Monitor" }}{% endblock %}</title>

    <!-- SEO meta tags -->
    <meta name="description" content="{{ seo_description }}">
    <meta name="keywords" content="{{ seo_keywords }}">
    <meta name="author" content="{{ seo_author }}">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="{{ seo_canonical }}">
    <meta name="theme-color" content="{{ seo_theme_color }}">

    <!-- Favicon and Manifest -->
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'site.webmanifest' %}">
    <link rel="shortcut icon" href="{% static 'favicon.ico' %}">
    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'android-chrome-512x512.png' %}">

    <!-- Open Graph -->
    <meta property="og:type" content="{{ seo_og_type }}">
    <meta property="og:title" content="{{ seo_title }}">
    <meta property="og:description" content="{{ seo_description }}">
    <meta property="og:url" content="{{ seo_canonical }}">
    <meta property="og:site_name" content="{{ seo_og_site_name }}">
    <meta property="og:locale" content="{{ seo_og_locale }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="{{ seo_twitter_card }}">
    <meta name="twitter:title" content="{{ seo_title }}">
    <meta name="twitter:description" content="{{ seo_description }}">

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">{{ seo_jsonld|safe }}</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>
    <style>
        /* Leaflet popup — dark theme */
        .gempa-popup .leaflet-popup-content-wrapper {
            background: rgba(9,9,11,0.97); border: 1px solid rgba(63,63,70,0.7);
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            padding: 0; overflow: hidden;
        }
        .gempa-popup .leaflet-popup-content { margin: 14px 16px; color: #d4d4d8; font-family: system-ui, -apple-system, sans-serif; }
        .gempa-popup .leaflet-popup-tip          { background: rgba(9,9,11,0.97); }
        .gempa-popup .leaflet-popup-tip-container { margin-top: -1px; }
        .gempa-popup .leaflet-popup-close-button {
            top: 8px !important; right: 8px !important; width: 20px !important; height: 20px !important;
            font-size: 16px !important; line-height: 20px !important; color: #71717a !important;
            background: rgba(39,39,42,0.8) !important; border-radius: 50% !important; transition: color .15s, background .15s;
        }
        .gempa-popup .leaflet-popup-close-button:hover { color: #e4e4e7 !important; background: rgba(63,63,70,0.8) !important; }
        /* Animated earthquake pulse marker */
        @keyframes gempa-ring-pulse {
            0%   { transform: scale(0.3); opacity: 1; }
            80%  { opacity: 0.15; }
            100% { transform: scale(3.8); opacity: 0; }
        }
        /* Narasi content */
        .narasi-content p { margin: .5rem 0; line-height: 1.75; }
        .narasi-content strong { color: #e4e4e7; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        /* DataTables dark theme */
        .dataTables_wrapper .dataTables_length select,
        .dataTables_wrapper .dataTables_filter input { background: #18181b; color: #d4d4d8; border: 1px solid #3f3f46; border-radius: 6px; padding: 2px 6px; }
        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_paginate { color: #71717a !important; font-size: 12px; }
        .dataTables_wrapper .dataTables_paginate .paginate_button { color: #a1a1aa !important; border-radius: 6px !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button:hover { background: #27272a !important; border-color: #3f3f46 !important; color: #e4e4e7 !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current,
        .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover { background: #3f3f46 !important; border-color: transparent !important; color: #f4f4f5 !important; }
        table.dataTable thead th, table.dataTable.no-footer { border-bottom-color: #27272a !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-black text-zinc-300 transition-colors duration-200" style="font-family: 'Inter', system-ui, sans-serif;">

    <!-- Loading bar -->
    <div id="loading-bar" class="fixed top-0 left-0 h-0.5 bg-gradient-to-r from-teal-400 via-teal-300 to-teal-500 z-50 transition-all duration-300 ease-out" style="width: 0%;"></div>

    <!-- Mobile top header -->
    <header class="md:hidden bg-black shadow-sm border-b border-zinc-800 fixed top-0 left-0 w-full z-30">
        <div class="px-4 py-3 flex items-center gap-3">
            <button onclick="toggleSidebar()"
                    class="p-2 rounded-lg hover:bg-zinc-800 transition-colors duration-200" aria-label="Toggle menu">
                <svg class="w-5 h-5 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
                <span class="font-bold text-sm text-zinc-300">Gempa<span class="text-indigo-400">.</span></span>
            </div>
        </div>
    </header>

    <div class="mx-auto max-w-6xl pt-20 lg:pt-0">
        <div class="flex flex-col lg:flex-row lg:gap-2 lg:py-4 xl:pb-8">
            {% include 'sidebar.html' %}

            <!-- Main content -->
            <div class="flex-1 md:ml-62">
                <main class="px-3 py-4 sm:px-4 md:px-6 lg:px-8">
                    <div class="max-w-7xl mx-auto z-10 w-full opacity-0 translate-y-8 transition-all duration-700 ease-out" id="main-content">
                        {% block content %}{% endblock %}
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Modals — direct <body> children so CSS fixed positioning uses the viewport, not a transformed ancestor -->
    {% block modals %}{% endblock %}

    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/map.js' %}"></script>
    <script>
        // Sidebar toggle for mobile
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const bd = document.getElementById('sidebar-backdrop');
            const isOpen = !sb.classList.contains('-translate-x-full');
            if (isOpen) {
                sb.classList.add('-translate-x-full');
                bd.classList.add('hidden');
            } else {
                sb.classList.remove('-translate-x-full');
                bd.classList.remove('hidden');
            }
        }
        // Content entry animation
        document.addEventListener('DOMContentLoaded', function() {
            const mc = document.getElementById('main-content');
            if (mc) { requestAnimationFrame(() => { mc.classList.remove('opacity-0','translate-y-8'); mc.classList.add('opacity-100','translate-y-0'); }); }
            // Loading bar
            const lb = document.getElementById('loading-bar');
            if (lb) { lb.style.width = '100%'; setTimeout(() => { lb.style.opacity = '0'; setTimeout(() => lb.remove(), 300); }, 500); }
        });
        // Loading bar progress on page load
        (function(){ const lb = document.getElementById('loading-bar'); if(lb){ lb.style.width='30%'; window.addEventListener('load',()=>{ lb.style.width='100%'; setTimeout(()=>{ lb.style.opacity='0'; },400); }); }})();
        // Global Escape key — closes topmost visible modal
        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Escape') return;
            const ids = ['img-modal','analisis-modal','narasi-modal','detail-modal','history-modal'];
            for (const id of ids) {
                const el = document.getElementById(id);
                if (el && !el.classList.contains('hidden')) { GempaUtils.hideModal(id); break; }
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
