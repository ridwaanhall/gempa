{% load static %}
<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ seo_title|default:"Gempa Indonesia — BMKG Monitor" }}{% endblock %}</title>

    <!-- SEO meta tags -->
    <meta name="description" content="{{ seo_description }}">
    <meta name="keywords" content="{{ seo_keywords }}">
    <meta name="author" content="{{ seo_author }}">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="{{ seo_canonical }}">
    <meta name="theme-color" content="{{ seo_theme_color }}">

    <!-- Open Graph -->
    <meta property="og:type" content="{{ seo_og_type }}">
    <meta property="og:title" content="{{ seo_title }}">
    <meta property="og:description" content="{{ seo_description }}">
    <meta property="og:url" content="{{ seo_canonical }}">
    <meta property="og:site_name" content="{{ seo_og_site_name }}">
    <meta property="og:locale" content="{{ seo_og_locale }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="{{ seo_twitter_card }}">
    <meta name="twitter:title" content="{{ seo_title }}">
    <meta name="twitter:description" content="{{ seo_description }}">

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">{{ seo_jsonld|safe }}</script>

    <link rel="stylesheet" href="{% static 'css/core.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>
    <style>
        .gempa-popup .leaflet-popup-content-wrapper {
            background: #1f2937; border: 1px solid #374151; border-radius: 12px;
            box-shadow: 0 10px 25px rgb(0 0 0 / .5);
        }
        .gempa-popup .leaflet-popup-tip { background: #1f2937; border: 1px solid #374151; }
        .gempa-popup .leaflet-popup-close-button { color: #9ca3af; }
        .leaflet-control-zoom a {
            background: #111827 !important; border-color: #374151 !important; color: #d1d5db !important;
        }
        .leaflet-control-attribution {
            background: rgb(17 24 39 / .8) !important; color: #6b7280 !important; font-size: 10px !important;
        }
        .leaflet-control-attribution a { color: #9ca3af !important; }
        .leaflet-control-layers { background: #111827 !important; border-color: #374151 !important; border-radius: 10px !important; }
        .leaflet-control-layers-list { color: #d1d5db !important; }
        .leaflet-control-layers-separator { border-top-color: #374151 !important; }
        /* DataTables dark theme */
        table.dataTable { border-collapse: collapse !important; width: 100% !important; }
        .dt-container { color: #d1d5db; font-size: 13px; }
        .dt-container .dt-layout-row {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
        }
        .dt-container .dt-layout-row:last-child { margin-bottom: 0; margin-top: 12px; }
        /* Search input */
        .dt-container .dt-search input {
            background: #111827; color: #d1d5db; border: 1px solid #374151;
            border-radius: 8px; padding: 6px 12px; font-size: 13px;
            transition: border-color .15s ease;
        }
        .dt-container .dt-search input:focus {
            outline: none; border-color: #10b981; box-shadow: 0 0 0 2px rgba(16,185,129,.15);
        }
        /* Length select: force appearance so the value is always visible */
        .dt-container .dt-length select {
            background: #111827; color: #d1d5db; border: 1px solid #374151;
            border-radius: 8px; padding: 6px 12px; font-size: 13px;
            transition: border-color .15s ease;
            -webkit-appearance: auto; appearance: auto;
            min-width: 64px; cursor: pointer;
        }
        .dt-container .dt-length select:focus {
            outline: none; border-color: #10b981; box-shadow: 0 0 0 2px rgba(16,185,129,.15);
        }
        .dt-container .dt-length select option {
            background: #111827; color: #d1d5db; padding: 4px 8px;
        }
        /* Info text */
        .dt-container .dt-info {
            color: #9ca3af; font-size: 13px; line-height: 1.5;
        }
        /* Length & search labels: consistent sizing */
        .dt-container .dt-search label,
        .dt-container .dt-length label {
            color: #9ca3af; font-size: 13px; line-height: 1.5;
            display: inline-flex; align-items: center; gap: 6px;
        }
        /* Pagination buttons */
        .dt-container .dt-paging {
            display: flex; align-items: center; gap: 2px;
        }
        .dt-container .dt-paging .dt-paging-button {
            color: #9ca3af !important; background: #111827 !important;
            border: 1px solid #374151 !important; border-radius: 6px !important;
            margin: 0 2px; padding: 6px 12px !important; font-size: 13px;
            line-height: 1.5; transition: all .15s ease; cursor: pointer;
        }
        .dt-container .dt-paging .dt-paging-button.current,
        .dt-container .dt-paging .dt-paging-button:hover {
            background: #10b981 !important; color: #fff !important;
            border-color: #10b981 !important;
        }
        .dt-container .dt-paging .dt-paging-button.disabled {
            color: #4b5563 !important; background: transparent !important;
            border-color: #1f2937 !important; cursor: default;
        }
        /* Table header */
        table.dataTable thead th {
            border-bottom: 2px solid #374151 !important; font-size: 11px;
            text-transform: uppercase; letter-spacing: .05em; color: #6b7280;
            padding: 10px 16px !important;
        }
        table.dataTable tbody td { padding: 10px 16px !important; }
        table.dataTable tbody tr { border-bottom: 1px solid rgba(31,41,55,.6) !important; transition: background .1s ease; }
        table.dataTable tbody tr:hover { background-color: rgba(31,41,55,.5) !important; }
        /* Sorting arrow colors */
        table.dataTable thead .dt-ordering-asc .dt-column-order::before,
        table.dataTable thead .dt-ordering-desc .dt-column-order::after { color: #10b981 !important; opacity: 1 !important; }
        /* Image detail modal */
        .gempa-img-modal { backdrop-filter: blur(4px); }
        .gempa-img-modal img {
            max-height: 80vh; border-radius: 8px;
            border: 1px solid #374151; cursor: zoom-in;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-950 text-gray-100 antialiased">
    <div class="flex h-full">

        {% include 'sidebar.html' %}

        <!-- Mobile header -->
        <div class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-gray-900/95 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center gap-3">
            <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')"
                    class="p-1.5 rounded-lg hover:bg-gray-800 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <span class="font-semibold text-emerald-400">Gempa Monitor</span>
        </div>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto lg:ml-0 pt-14 lg:pt-0">
            <div class="p-4 lg:p-6 max-w-screen-2xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/map.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
