{% load static %}
<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ seo_title|default:"Gempa Indonesia — BMKG Monitor" }}{% endblock %}</title>

    <!-- SEO meta tags -->
    <meta name="description" content="{{ seo_description }}">
    <meta name="keywords" content="{{ seo_keywords }}">
    <meta name="author" content="{{ seo_author }}">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="{{ seo_canonical }}">
    <meta name="theme-color" content="{{ seo_theme_color }}">

    <!-- Open Graph -->
    <meta property="og:type" content="{{ seo_og_type }}">
    <meta property="og:title" content="{{ seo_title }}">
    <meta property="og:description" content="{{ seo_description }}">
    <meta property="og:url" content="{{ seo_canonical }}">
    <meta property="og:site_name" content="{{ seo_og_site_name }}">
    <meta property="og:locale" content="{{ seo_og_locale }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="{{ seo_twitter_card }}">
    <meta name="twitter:title" content="{{ seo_title }}">
    <meta name="twitter:description" content="{{ seo_description }}">

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">{{ seo_jsonld|safe }}</script>

    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>
    <style>
        /* ── Custom scrollbar ───────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        * { scrollbar-width: thin; scrollbar-color: #374151 transparent; }

        /* ── Leaflet overrides (dark theme) ──────────────────── */
        .gempa-popup .leaflet-popup-content-wrapper {
            background: #111827; border: 1px solid #1f2937; border-radius: 16px;
            box-shadow: 0 20px 40px rgb(0 0 0 / .6);
        }
        .gempa-popup .leaflet-popup-tip { background: #111827; border: 1px solid #1f2937; }
        .gempa-popup .leaflet-popup-close-button { color: #6b7280; font-size: 16px; }
        .gempa-popup .leaflet-popup-close-button:hover { color: #d1d5db; }
        .leaflet-control-zoom a {
            background: #0d1117 !important; border-color: #1f2937 !important; color: #9ca3af !important;
            transition: all .15s ease;
        }
        .leaflet-control-zoom a:hover { background: #1f2937 !important; color: #fff !important; }
        .leaflet-control-attribution {
            background: rgb(13 17 23 / .85) !important; color: #4b5563 !important; font-size: 10px !important;
            backdrop-filter: blur(8px);
        }
        .leaflet-control-attribution a { color: #6b7280 !important; }
        .leaflet-control-layers {
            background: #0d1117 !important; border-color: #1f2937 !important; border-radius: 12px !important;
            box-shadow: 0 8px 24px rgb(0 0 0 / .4) !important;
        }
        .leaflet-control-layers-list { color: #d1d5db !important; }
        .leaflet-control-layers-separator { border-top-color: #1f2937 !important; }

        /* ── DataTables dark theme ──────────────────────────── */
        table.dataTable { border-collapse: collapse !important; width: 100% !important; }
        .dt-container { color: #d1d5db; font-size: 13px; }
        .dt-container .dt-layout-row {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
        }
        .dt-container .dt-layout-row:last-child { margin-bottom: 0; margin-top: 12px; }
        .dt-container .dt-search input {
            background: #0d1117; color: #d1d5db; border: 1px solid #1f2937;
            border-radius: 10px; padding: 8px 14px; font-size: 13px;
            transition: all .2s ease;
        }
        .dt-container .dt-search input:focus {
            outline: none; border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,.1), 0 0 0 1px rgba(16,185,129,.3);
        }
        .dt-container .dt-length select {
            background: #0d1117; color: #d1d5db; border: 1px solid #1f2937;
            border-radius: 10px; padding: 8px 14px; font-size: 13px;
            transition: all .2s ease; -webkit-appearance: auto; appearance: auto;
            min-width: 64px; cursor: pointer;
        }
        .dt-container .dt-length select:focus {
            outline: none; border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,.1), 0 0 0 1px rgba(16,185,129,.3);
        }
        .dt-container .dt-length select option { background: #0d1117; color: #d1d5db; }
        .dt-container .dt-info { color: #6b7280; font-size: 13px; line-height: 1.5; }
        .dt-container .dt-search label,
        .dt-container .dt-length label {
            color: #6b7280; font-size: 13px; line-height: 1.5;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .dt-container .dt-paging { display: flex; align-items: center; gap: 3px; }
        .dt-container .dt-paging .dt-paging-button {
            color: #9ca3af !important; background: #0d1117 !important;
            border: 1px solid #1f2937 !important; border-radius: 8px !important;
            margin: 0 1px; padding: 7px 13px !important; font-size: 13px;
            line-height: 1.4; transition: all .15s ease; cursor: pointer;
        }
        .dt-container .dt-paging .dt-paging-button.current,
        .dt-container .dt-paging .dt-paging-button:hover {
            background: #10b981 !important; color: #fff !important;
            border-color: #10b981 !important;
        }
        .dt-container .dt-paging .dt-paging-button.disabled {
            color: #374151 !important; background: transparent !important;
            border-color: #111827 !important; cursor: default;
        }
        table.dataTable thead th {
            border-bottom: 2px solid #1f2937 !important; font-size: 11px;
            text-transform: uppercase; letter-spacing: .06em; color: #6b7280;
            padding: 12px 16px !important; font-weight: 600;
        }
        table.dataTable tbody td { padding: 12px 16px !important; }
        table.dataTable tbody tr {
            border-bottom: 1px solid rgba(31,41,55,.4) !important;
            transition: background .15s ease;
        }
        table.dataTable tbody tr:hover { background-color: rgba(16,185,129,.03) !important; }
        table.dataTable thead .dt-ordering-asc .dt-column-order::before,
        table.dataTable thead .dt-ordering-desc .dt-column-order::after {
            color: #10b981 !important; opacity: 1 !important;
        }

        /* ── Narasi content styling ─────────────────────────── */
        [data-narasi-styles] h4 { color: #fff; font-size: 1rem; font-weight: 600; margin-bottom: .5rem; }
        [data-narasi-styles] p { color: #d1d5db; font-size: .875rem; line-height: 1.625; margin-bottom: .75rem; }
        [data-narasi-styles] em { color: #9ca3af; }
        [data-narasi-styles] strong { color: #fff; }
        [data-narasi-styles] a { color: #34d399; }

        /* ── Image lightbox ─────────────────────────────────── */
        .gempa-img-modal img {
            max-height: 80vh; border-radius: 12px;
            border: 1px solid #1f2937; cursor: zoom-in;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-black text-zinc-300 transition-colors duration-200">

    <!-- Loading bar -->
    <div id="loading-bar" class="fixed top-0 left-0 h-0.5 bg-gradient-to-r from-teal-400 via-teal-300 to-teal-500 z-50 transition-all duration-300 ease-out" style="width: 0%;"></div>

    <!-- Mobile top header -->
    <header class="md:hidden bg-black shadow-sm border-b border-zinc-800 fixed top-0 left-0 w-full z-40">
        <div class="px-4 py-3 flex items-center gap-3">
            <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full');document.getElementById('sidebar-backdrop').style.display=document.getElementById('sidebar').classList.contains('-translate-x-full')?'none':'block'"
                    class="p-2 rounded-lg hover:bg-zinc-800 transition-colors duration-200" aria-label="Toggle menu">
                <svg class="w-5 h-5 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
                <span class="font-bold text-sm text-zinc-300">Gempa<span class="text-indigo-400">.</span></span>
            </div>
        </div>
    </header>

    <div class="mx-auto max-w-6xl pt-20 lg:pt-0">
        <div class="flex flex-col lg:flex-row lg:gap-2 lg:py-4 xl:pb-8">
            {% include 'sidebar.html' %}

            <!-- Main content -->
            <div class="flex-1 md:ml-62">
                <main class="px-3 py-4 sm:px-4 md:px-6 lg:px-8">
                    <div class="max-w-7xl mx-auto z-10 w-full opacity-0 translate-y-8 transition-all duration-700 ease-out" id="main-content">
                        {% block content %}{% endblock %}
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="{% static 'js/utils.js' %}"></script>
    <script src="{% static 'js/map.js' %}"></script>
    <script>
        // Content entry animation
        document.addEventListener('DOMContentLoaded', function() {
            const mc = document.getElementById('main-content');
            if (mc) { requestAnimationFrame(() => { mc.classList.remove('opacity-0','translate-y-8'); mc.classList.add('opacity-100','translate-y-0'); }); }
            // Loading bar
            const lb = document.getElementById('loading-bar');
            if (lb) { lb.style.width = '100%'; setTimeout(() => { lb.style.opacity = '0'; setTimeout(() => lb.remove(), 300); }, 500); }
        });
        // Loading bar progress on page load
        (function(){ const lb = document.getElementById('loading-bar'); if(lb){ lb.style.width='30%'; window.addEventListener('load',()=>{ lb.style.width='100%'; setTimeout(()=>{ lb.style.opacity='0'; },400); }); }})();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
