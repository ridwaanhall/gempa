<!-- Sidebar navigation -->

            Peringatan Tsunami

        <a href="{% url 'web:damage' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors

    <div class="px-5 py-4 border-t border-gray-800">
        <p class="text-[11px] text-gray-600">Data dari BMKG Indonesia</p>
        <p class="text-[10px] text-gray-700 mt-0.5">ridwaanhall</p>
    </div>
</aside>

<!-- Backdrop for mobile -->
<div onclick="document.getElementById('sidebar').classList.add('-translate-x-full')"
     class="fixed inset-0 bg-black/50 z-40 lg:hidden"
     id="sidebar-backdrop"
     style="display:none;"></div>

<script>
(function() {
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    const observer = new MutationObserver(function() {
        backdrop.style.display = sidebar.classList.contains('-translate-x-full') ? 'none' : 'block';
    });
    observer.observe(sidebar, { attributes: true, attributeFilter: ['class'] });
})();
</script>
