<!-- Detail modal component — reusable detail viewer for earthquake data -->
<!-- Used across: felt, m5, tsunami pages. JS populates #detail-title and #detail-content -->
<div id="detail-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm overflow-y-auto"
     onclick="if(event.target===this){this.classList.add('hidden');document.body.classList.remove('overflow-hidden')}">
    <div class="flex items-center justify-center min-h-full p-4">
        <div class="relative bg-zinc-900 rounded-xl border border-zinc-700/50 max-w-4xl w-full max-h-[90vh] overflow-hidden shadow-2xl">
            <div class="sticky top-0 z-10 bg-zinc-900 border-b border-zinc-700 px-6 py-4 flex items-center justify-between">
                <h3 id="detail-title" class="text-sm font-medium text-zinc-300 truncate pr-4"></h3>
                <button onclick="document.getElementById('detail-modal').classList.add('hidden');document.body.classList.remove('overflow-hidden')"
                        class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="detail-content" class="p-6 overflow-y-auto" style="max-height: calc(90vh - 4rem);"></div>
        </div>
    </div>
</div>
