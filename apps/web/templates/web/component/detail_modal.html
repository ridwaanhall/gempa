<!-- Detail modal component — reusable detail viewer for earthquake data -->
<!-- Used across: felt, m5, tsunami pages. JS populates #detail-title and #detail-content -->
<div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
     style="background:rgba(0,0,0,.7);backdrop-filter:blur(4px)"
     onclick="if(event.target===this)GempaUtils.hideModal('detail-modal')">
    <div class="w-full max-w-4xl max-h-[85vh] flex flex-col bg-zinc-900 rounded-xl border border-zinc-700/50 shadow-2xl overflow-hidden">
        <div class="shrink-0 bg-zinc-900 border-b border-zinc-700 px-6 py-4 flex items-center justify-between">
            <h3 id="detail-title" class="text-sm font-medium text-zinc-300 truncate pr-4"></h3>
            <button onclick="GempaUtils.hideModal('detail-modal')"
                    class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors duration-200">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div id="detail-content" class="min-h-0 overflow-y-auto p-6"></div>
    </div>
</div>
