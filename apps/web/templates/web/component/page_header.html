<!-- Page header component — consistent title block across pages -->
<div class="mb-8">
    <div class="flex items-center gap-3">
        {% if icon %}
        <div class="w-10 h-10 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="{{ icon }}"/>
            </svg>
        </div>
        {% endif %}
        <div class="min-w-0">
            <div class="flex items-center gap-3 flex-wrap">
                <h1 class="text-2xl font-bold text-white tracking-tight">{{ title }}</h1>
                {% if badge %}
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-semibold {{ badge_color|default:'bg-emerald-500/15 text-emerald-400 border border-emerald-500/25' }}">
                    {{ badge }}
                </span>
                {% endif %}
            </div>
            {% if subtitle %}
            <p class="text-sm text-gray-500 mt-1">{{ subtitle }}</p>
            {% endif %}
        </div>
    </div>
</div>
