<!-- Page header component — consistent title block across pages -->
<div class="mb-4 md:mb-6">
    <h1 class="text-2xl lg:text-3xl font-medium mb-2 tracking-tight">
        {% if icon %}
        <svg class="w-5 h-5 text-indigo-400 inline-block mr-2 -mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="{{ icon }}"/>
        </svg>
        {% endif %}
        {{ title }}
        {% if badge %}
        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium {{ badge_color|default:'bg-indigo-800 text-indigo-300' }} ml-2">
            {{ badge }}
        </span>
        {% endif %}
    </h1>
    {% if subtitle %}
    <p class="mt-2 text-base sm:text-lg text-zinc-300 leading-relaxed">{{ subtitle }}</p>
    {% endif %}
</div>
