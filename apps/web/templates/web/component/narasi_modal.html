<!-- Narasi BMKG modal — reusable across felt/m5/tsunami/home pages -->
<div id="narasi-modal" class="hidden fixed inset-0 z-[55] bg-black/70 backdrop-blur-sm overflow-y-auto"
     onclick="if(event.target===this){GempaUtils.hideModal('narasi-modal');document.body.classList.remove('overflow-hidden')}">
    <div class="flex items-center justify-center min-h-full p-4">
        <div class="relative bg-zinc-900 rounded-xl border border-zinc-700/50 max-w-3xl w-full max-h-[85vh] overflow-hidden shadow-2xl">
            <div class="sticky top-0 z-10 bg-zinc-900 border-b border-zinc-700 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-2.5 min-w-0">
                    <svg class="w-5 h-5 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <h3 id="narasi-title" class="text-sm font-medium text-zinc-300 truncate">Narasi BMKG</h3>
                </div>
                <button onclick="GempaUtils.hideModal('narasi-modal');document.body.classList.remove('overflow-hidden')"
                        class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="narasi-content" class="p-6 overflow-y-auto" style="max-height: calc(85vh - 4rem);"
                 data-narasi-styles
                >
            </div>
        </div>
    </div>
</div>
