<!-- Image lightbox modal component — reusable across pages that show BMKG analysis images -->
<!-- JS sets #img-modal-src (src) and #img-modal-title (textContent) before showing -->
<div id="img-modal" class="hidden fixed inset-0 z-[60] bg-black/85 backdrop-blur-sm flex items-center justify-center p-4"
     onclick="if(event.target===this){this.classList.add('hidden');document.body.classList.remove('overflow-hidden')}">
        <div class="relative max-w-5xl w-full">
            <button onclick="document.getElementById('img-modal').classList.add('hidden');document.body.classList.remove('overflow-hidden')"
                    class="absolute -top-12 right-0 w-10 h-10 rounded-xl flex items-center justify-center text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800/50 transition-colors duration-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            <p id="img-modal-title" class="text-sm text-zinc-300 mb-3 text-center font-medium"></p>
            <img id="img-modal-src" src="" alt="" class="mx-auto rounded-xl border border-zinc-700/50 shadow-2xl" style="max-height:80vh">
        </div>
</div>
