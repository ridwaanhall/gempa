<!-- Stats card component — semi-transparent with colored border accent -->
<div class="bg-transparent backdrop-blur-sm rounded-lg sm:rounded-xl hover:shadow-lg overflow-hidden p-3 sm:p-4 border border-indigo-500/50 transition-all duration-300 hover:shadow-indigo-500/10">
    <p class="text-xs sm:text-sm text-zinc-400 uppercase tracking-wider">{{ label }}</p>
    <p id="{{ value_id }}" class="mt-2 text-2xl font-bold {{ color|default:'text-zinc-300' }} tracking-tight">—</p>
    {% if sublabel %}
    <p class="mt-1 text-xs text-zinc-500">{{ sublabel }}</p>
    {% endif %}
</div>
