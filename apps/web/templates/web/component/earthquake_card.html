<!-- Earthquake info card component — populated by JS -->
<div class="bg-gray-900 rounded-xl border border-gray-800 p-5">
    <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
            <h3 id="{{ card_id }}-area" class="font-semibold text-white truncate">—</h3>
            <p id="{{ card_id }}-time" class="text-xs text-gray-500 mt-1">—</p>
        </div>
        <div class="text-right shrink-0">
            <span id="{{ card_id }}-mag"
                  class="inline-block px-3 py-1 rounded-full text-sm font-bold bg-gray-800 text-gray-300">—</span>
        </div>
    </div>
    <div class="mt-3 grid grid-cols-3 gap-3 text-center">
        <div>
            <p class="text-[10px] text-gray-600 uppercase">Kedalaman</p>
            <p id="{{ card_id }}-depth" class="text-sm font-medium text-gray-300">—</p>
        </div>
        <div>
            <p class="text-[10px] text-gray-600 uppercase">Lintang</p>
            <p id="{{ card_id }}-lat" class="text-sm font-medium text-gray-300">—</p>
        </div>
        <div>
            <p class="text-[10px] text-gray-600 uppercase">Bujur</p>
            <p id="{{ card_id }}-lon" class="text-sm font-medium text-gray-300">—</p>
        </div>
    </div>
    <p id="{{ card_id }}-desc" class="mt-3 text-xs text-gray-500 leading-relaxed" style="display:none;"></p>
</div>
