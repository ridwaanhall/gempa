<!-- Earthquake info card component — populated by JS -->
<div class="bg-gray-900/80 backdrop-blur-sm rounded-2xl border border-gray-800/60 shadow-lg shadow-black/10 p-5 hover:border-gray-700/60 transition-all duration-200">
    <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
            <h3 id="{{ card_id }}-area" class="font-semibold text-white truncate">—</h3>
            <p id="{{ card_id }}-time" class="text-xs text-gray-500 mt-1">—</p>
        </div>
        <div class="text-right shrink-0">
            <span id="{{ card_id }}-mag"
                  class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold bg-gray-800 text-gray-300">—</span>
        </div>
    </div>
    <div class="mt-4 grid grid-cols-3 gap-3 text-center">
        <div class="bg-gray-800/40 rounded-xl py-2.5 px-2">
            <p class="text-[10px] text-gray-500 uppercase font-medium">Kedalaman</p>
            <p id="{{ card_id }}-depth" class="text-sm font-semibold text-gray-300 mt-0.5">—</p>
        </div>
        <div class="bg-gray-800/40 rounded-xl py-2.5 px-2">
            <p class="text-[10px] text-gray-500 uppercase font-medium">Lintang</p>
            <p id="{{ card_id }}-lat" class="text-sm font-semibold text-gray-300 mt-0.5">—</p>
        </div>
        <div class="bg-gray-800/40 rounded-xl py-2.5 px-2">
            <p class="text-[10px] text-gray-500 uppercase font-medium">Bujur</p>
            <p id="{{ card_id }}-lon" class="text-sm font-semibold text-gray-300 mt-0.5">—</p>
        </div>
    </div>
    <p id="{{ card_id }}-desc" class="mt-3 text-xs text-gray-500 leading-relaxed" style="display:none;"></p>
</div>
