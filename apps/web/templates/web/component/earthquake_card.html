<!-- Earthquake info card component — populated by JS -->
<div class="rounded-xl border border-zinc-700/50 transition-all duration-300 hover:border-zinc-700 overflow-hidden backdrop-blur-sm">
    <div class="p-2 sm:p-3 md:p-4">
        <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
                <h3 id="{{ card_id }}-area" class="text-base sm:text-lg md:text-xl font-medium text-zinc-300 truncate">—</h3>
                <p id="{{ card_id }}-time" class="text-xs sm:text-sm text-zinc-400 mt-1">—</p>
            </div>
            <div class="text-right shrink-0">
                <span id="{{ card_id }}-mag"
                      class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold bg-zinc-800 text-zinc-300">—</span>
            </div>
        </div>
        <div class="mt-4 grid grid-cols-3 gap-3 text-center">
            <div class="bg-zinc-800/30 rounded-lg py-2.5 px-2">
                <p class="text-xs text-zinc-500 uppercase font-medium">Kedalaman</p>
                <p id="{{ card_id }}-depth" class="text-sm font-semibold text-zinc-300 mt-0.5">—</p>
            </div>
            <div class="bg-zinc-800/30 rounded-lg py-2.5 px-2">
                <p class="text-xs text-zinc-500 uppercase font-medium">Lintang</p>
                <p id="{{ card_id }}-lat" class="text-sm font-semibold text-zinc-300 mt-0.5">—</p>
            </div>
            <div class="bg-zinc-800/30 rounded-lg py-2.5 px-2">
                <p class="text-xs text-zinc-500 uppercase font-medium">Bujur</p>
                <p id="{{ card_id }}-lon" class="text-sm font-semibold text-zinc-300 mt-0.5">—</p>
            </div>
        </div>
        <p id="{{ card_id }}-desc" class="mt-3 text-xs text-zinc-400 leading-relaxed" style="display:none;"></p>
    </div>
</div>
