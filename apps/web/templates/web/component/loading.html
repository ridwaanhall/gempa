<!-- Loading skeleton component — improved with better animation -->
<div id="{{ container_id|default:'loading' }}" class="flex flex-col items-center justify-center py-16 text-gray-500">
    <div class="relative w-12 h-12 mb-4">
        <div class="absolute inset-0 rounded-full border-2 border-gray-800"></div>
        <div class="absolute inset-0 rounded-full border-2 border-emerald-400/60 border-t-transparent animate-spin"></div>
        <div class="absolute inset-2 rounded-full border-2 border-emerald-500/30 border-b-transparent animate-spin" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
    </div>
    <p class="text-sm text-gray-400 font-medium">Memuat data&hellip;</p>
    <p class="text-xs text-gray-600 mt-1">Mohon tunggu sebentar</p>
</div>
