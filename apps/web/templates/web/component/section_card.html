<!-- Section card component — consistent card wrapper for content sections -->
<!-- Usage: wrap content in this card for a consistent elevated panel look -->
<!-- Parameters: title (optional), title_id (optional), subtitle (optional), subtitle_id (optional), extra_class (optional) -->
<div class="bg-gray-900/80 backdrop-blur-sm rounded-2xl border border-gray-800/60 shadow-lg shadow-black/10 overflow-hidden {{ extra_class }}">
    {% if title %}
    <div class="px-5 py-4 border-b border-gray-800/60 flex items-center justify-between">
        <h3 class="text-sm font-semibold text-gray-200">{{ title }}</h3>
        {% if subtitle_id %}
        <span id="{{ subtitle_id }}" class="text-xs text-gray-500">{{ subtitle|default:'—' }}</span>
        {% elif subtitle %}
        <span class="text-xs text-gray-500">{{ subtitle }}</span>
        {% endif %}
    </div>
    {% endif %}
    {{ content }}
</div>
